    {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Übernimmt meine Krankenkasse die Behandlungskosten?","acceptedAnswer":{"@type":"Answer","text":"Das hängt von Versicherung und Behandlung ab. Gesetzliche Kassen übernehmen die Regelversorgung; bei ästhetischen Behandlungen oder Implantaten kann ein Eigenanteil entstehen. Wir erklären die Kosten vorher und erstellen bei Bedarf einen Heil- und Kostenplan."}},{"@type":"Question","name":"Wie kann ich einen Termin vereinbaren?","acceptedAnswer":{"@type":"Answer","text":"Sie erreichen uns telefonisch unter 07139 452176 oder über das Kontaktformular. Die Online-Terminbuchung wird aktuell verbessert; unser Praxisteam vereinbart Ihren Termin persönlich."}},{"@type":"Question","name":"Was mache ich bei akuten Zahnschmerzen außerhalb der Sprechzeiten?","acceptedAnswer":{"@type":"Answer","text":"Bei einem akuten Notfall am Wochenende oder an Feiertagen wenden Sie sich bitte an den zahnärztlichen Notdienst. Die aktuelle Nummer erfahren Sie über unseren Anrufbeantworter oder das zentrale Notdienstportal."}},{"@type":"Question","name":"Gibt es Parkplätze in der Nähe der Praxis?","acceptedAnswer":{"@type":"Answer","text":"Ja. Direkt vor und hinter der Zahnarztpraxis in Neuenstadt am Kocher stehen kostenlose Patientenparkplätze zur Verfügung."}},{"@type":"Question","name":"Ist die Praxis barrierefrei zugänglich?","acceptedAnswer":{"@type":"Answer","text":"Ja. Die Praxisräume im Erdgeschoss sind barrierefrei erreichbar, auch mit Kinderwagen, Rollator oder Rollstuhl."}},{"@type":"Question","name":"Welche Möglichkeiten gibt es für Angstpatienten?","acceptedAnswer":{"@type":"Answer","text":"Wir nehmen Zahnarztangst ernst, planen auf Wunsch einen ruhigen Kennenlerntermin und erklären jeden Schritt. Bei notwendigen Eingriffen besprechen wir eine lokale Betäubung. Eine Sedierung oder Vollnarkose gehört nicht zum regulären Angebot."}},{"@type":"Question","name":"Was kostet eine professionelle Zahnreinigung (PZR)?","acceptedAnswer":{"@type":"Answer","text":"Die Kosten richten sich nach Aufwand und Anzahl der zu reinigenden Zähne. Viele gesetzliche Krankenkassen bezuschussen die PZR, private Versicherungen übernehmen sie häufig nach Tarif. Wir informieren Sie vorab transparent."}},{"@type":"Question","name":"Was ist eine Teleskopprothese und wann wird sie eingesetzt?","acceptedAnswer":{"@type":"Answer","text":"Eine Teleskopprothese ist herausnehmbarer Zahnersatz, der ohne sichtbare Klammern an den verbliebenen Zähnen befestigt wird. Sie kann sinnvoll sein, wenn mehrere Zähne fehlen und sicherer Halt wichtig ist."}},{"@type":"Question","name":"Wie läuft eine maschinelle Wurzelkanalbehandlung ab?","acceptedAnswer":{"@type":"Answer","text":"Mit feinen, flexiblen Instrumenten und Vergrößerung reinigen wir entzündete Wurzelkanäle sorgfältig und verschließen sie anschließend dicht. Ziel ist, den erkrankten Zahn möglichst langfristig zu erhalten."}},{"@type":"Question","name":"Wann brauche ich eine Knirscherschiene?","acceptedAnswer":{"@type":"Answer","text":"Morgenliche Kiefer- oder Nackenschmerzen, empfindliche Zähne und sichtbarer Abrieb können auf Zähneknirschen hinweisen. Eine individuell angepasste Schiene schützt die Zähne nachts und kann die Kaumuskulatur entlasten."}}]}
